<!DOCTYPE html>
<html>

<head>

<title>Officer Directory</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:30px;
background:#f5f5f5;
}

h2{
text-align:center;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
justify-content:center;
}

input, select{
padding:10px;
font-size:14px;
border-radius:5px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#2c3e50;
color:white;
padding:10px;
cursor:pointer;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#fafafa;
}

</style>

</head>

<body>

<h2>Officer Directory</h2>

<div class="controls">

<input type="text" id="search" placeholder="Search anything...">

<select id="columnFilter">
<option value="">All Columns</option>
</select>

</div>

<table>

<thead>
<tr id="tableHead"></tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

let data=[];
let columns=[];

fetch("https://opensheet.elk.sh/17DTRZUbVyZN7dA7wSsmNSTlR97OTRsUhgS9_ITAVV7A/Data")
.then(res=>res.json())
.then(json=>{

data=json;

columns=Object.keys(data[0]);

buildTable();

buildColumnFilter();

display(data);

});

function buildTable(){

let head="";

columns.forEach(col=>{
head+=`<th onclick="sortTable('${col}')">${col}</th>`;
});

document.getElementById("tableHead").innerHTML=head;

}

function buildColumnFilter(){

let html=`<option value="">All Columns</option>`;

columns.forEach(col=>{
html+=`<option value="${col}">${col}</option>`;
});

document.getElementById("columnFilter").innerHTML=html;

}

function display(list){

let html="";

list.forEach(row=>{

html+="<tr>";

columns.forEach(col=>{
html+=`<td>${row[col] || ""}</td>`;
});

html+="</tr>";

});

document.getElementById("tableBody").innerHTML=html;

}

document.getElementById("search").addEventListener("keyup",filterData);
document.getElementById("columnFilter").addEventListener("change",filterData);

function filterData(){

let text=document.getElementById("search").value.toLowerCase();
let column=document.getElementById("columnFilter").value;

let filtered=data.filter(row=>{

if(column){

return String(row[column]).toLowerCase().includes(text);

}else{

return Object.values(row).some(val=>
String(val).toLowerCase().includes(text)
);

}

});

display(filtered);

}

function sortTable(col){

data.sort((a,b)=>{

return String(a[col]).localeCompare(String(b[col]));

});

display(data);

}

</script>

</body>

</html>
